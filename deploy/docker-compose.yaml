services:
  postgres:
    image: postgis/postgis:18-master
    container_name: ski_tracker-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ski_tracker
      POSTGRES_USER: ski_tracker
      POSTGRES_PASSWORD: ski_tracker
    volumes:
      - pgdata_tracker:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ski_tracker"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata_tracker: